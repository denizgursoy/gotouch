# 1) Yes/No Question screenshot
#    Select this project, then screenshot the "Do you want Dockerfile?" yes/no prompt
- name: Yes/No Question Demo
  url: https://github.com/denizgursoy/go-touch-projects.git
  branch: empty
  language: go
  questions:
    - direction: Do you want Dockerfile?
      canSkip: true
      choices:
        - choice: Yes
          files:
            - url: https://raw.githubusercontent.com/denizgursoy/go-touch-projects/main/Dockerfile
              pathFromRoot: Dockerfile

# 2) Multiple Choice Question screenshot
#    Select this project, then screenshot the "Which HTTP framework?" select prompt
- name: Multiple Choice Question Demo
  url: https://github.com/denizgursoy/go-touch-projects.git
  branch: empty
  language: go
  questions:
    - direction: Which HTTP framework do you want to use?
      choices:
        - choice: Echo
          dependencies:
            - github.com/labstack/echo/v4
        - choice: Gorilla Mux
          dependencies:
            - github.com/gorilla/mux
        - choice: Gin
          dependencies:
            - github.com/gin-gonic/gin

