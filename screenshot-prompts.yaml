# 4) Multiple Select Question screenshot
#    Select this project, then screenshot the multi-select prompt
- name: Multiple Select Question Demo
  url: https://github.com/denizgursoy/go-touch-projects.git
  branch: empty
  language: go
  questions:
    - direction: Select features you want
      canSelectMultiple: true
      choices:
        - choice: Elastic APM
          values:
            isElastic: true
        - choice: Swagger
          values:
            isSwagger: true
        - choice: Keycloak
          values:
            isKeycloak: true

# 5) Edit Values screenshot
#    Select this project, then screenshot the "Do you want to edit values?" prompt
- name: Edit Values Demo
  url: https://github.com/denizgursoy/go-touch-projects.git
  branch: empty
  language: go
  customValues:
    Port: 8080
